<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flight simulation replay</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef2f6;
      color: #17202a;
    }
    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    .panel {
      position: fixed;
      left: 18px;
      right: 18px;
      bottom: 18px;
      display: grid;
      grid-template-columns: auto 1fr auto auto auto auto;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #d7dde3;
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(24, 34, 46, 0.12);
      z-index: 3;
    }
    button {
      height: 34px;
      padding: 0 14px;
      border: 1px solid #b9c3cc;
      border-radius: 6px;
      background: #ffffff;
      color: #17202a;
      font-weight: 700;
      cursor: pointer;
    }
    select {
      height: 34px;
      border: 1px solid #b9c3cc;
      border-radius: 6px;
      background: #ffffff;
      color: #17202a;
      font-weight: 700;
    }
    input[type="range"] {
      width: 100%;
    }
    .metric {
      min-width: 90px;
      font-size: 13px;
      line-height: 1.2;
      color: #5d6b78;
    }
    .metric strong {
      display: block;
      color: #17202a;
      font-size: 15px;
    }
    .title {
      position: fixed;
      top: 18px;
      left: 18px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #d7dde3;
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(24, 34, 46, 0.10);
      z-index: 2;
    }
    .title h1 {
      margin: 0 0 6px;
      font-size: 18px;
    }
    .title div {
      color: #5d6b78;
      font-size: 13px;
    }
    @media (max-width: 760px) {
      .panel {
        grid-template-columns: auto 1fr;
      }
      .metric {
        display: none;
      }
    }
  </style>
</head>

      const w = window.innerWidth;
      const h = window.innerHeight;
      ctx.fillStyle = "#eef2f6";
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = "#d7dde3";
      ctx.lineWidth = 1;
      for (let i = -10; i <= 10; i++) {
        ctx.beginPath();
        ctx.moveTo(w * 0.08, h * 0.5 + i * 28);
        ctx.lineTo(w * 0.92, h * 0.5 + i * 28);
        ctx.stroke();
      }
      for (let i = -12; i <= 12; i++) {
        ctx.beginPath();
        ctx.moveTo(w * 0.5 + i * 34, h * 0.12);
        ctx.lineTo(w * 0.5 + i * 34, h * 0.88);
        ctx.stroke();
      }
    }

    function drawPath() {
      ctx.lineWidth = 3;
      ctx.strokeStyle = "#1f77b4";
      ctx.beginPath();
      points.forEach((p, index) => {
        const screen = project(p);
        if (index === 0) ctx.moveTo(screen.x, screen.y);
        else ctx.lineTo(screen.x, screen.y);
      });
      ctx.stroke();
    }

    function draw() {
      drawGrid();
      drawPath();
      const p = pointAtTime(playheadSeconds);
      const screen = project(p);
      ctx.strokeStyle = "rgba(23, 32, 42, 0.28)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(screen.x, screen.y);
      ctx.lineTo(screen.x, screen.shadowY);
      ctx.stroke();
      ctx.fillStyle = "rgba(23, 32, 42, 0.16)";
      ctx.beginPath();
      ctx.ellipse(screen.x, screen.shadowY, 15, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#d62728";
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(screen.x, screen.y, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      slider.value = String(Math.round((playheadSeconds / duration) * 1000));
      timeValue.textContent = `${p.t.toFixed(1)} s`;
      speedValue.textContent = `${p.speed.toFixed(2)} m/s`;
      altValue.textContent = `${p.z.toFixed(1)} m`;
    }

    function tick(now) {
      const delta = Math.min((now - lastFrame) / 1000, 0.25);
      lastFrame = now;
      if (playing) {
        const replaySpeed = Number(speedSelect.value);
        playheadSeconds = Math.min(duration, playheadSeconds + delta * replaySpeed);
        if (playheadSeconds >= duration) {
          playing = false;
          playButton.textContent = "Play";
        }
        draw();
      }
      requestAnimationFrame(tick);
    }

    playButton.addEventListener("click", () => {
      if (playheadSeconds >= duration) playheadSeconds = 0;
      playing = !playing;
      playButton.textContent = playing ? "Pause" : "Play";
      lastFrame = performance.now();
      draw();
    });
    slider.addEventListener("input", () => {
      playing = false;
      playButton.textContent = "Play";
      playheadSeconds = duration * Number(slider.value) / 1000;
      draw();
    });
    window.addEventListener("resize", resize);
    resize();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
