<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flight simulation replay</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef2f6;
      color: #17202a;
    }
    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    .panel {
      position: fixed;
      left: 18px;
      right: 18px;
      bottom: 18px;
      display: grid;
      grid-template-columns: auto 1fr auto auto auto auto;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #d7dde3;
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(24, 34, 46, 0.12);
      z-index: 3;
    }
    button {
      height: 34px;
      padding: 0 14px;
      border: 1px solid #b9c3cc;
      border-radius: 6px;
      background: #ffffff;
      color: #17202a;
      font-weight: 700;
      cursor: pointer;
    }
    select {
      height: 34px;
      border: 1px solid #b9c3cc;
      border-radius: 6px;
      background: #ffffff;
      color: #17202a;
      font-weight: 700;
    }
    input[type="range"] {
      width: 100%;
    }
    .metric {
      min-width: 90px;
      font-size: 13px;
      line-height: 1.2;
      color: #5d6b78;
    }
    .metric strong {
      display: block;
      color: #17202a;
      font-size: 15px;
    }
    .title {
      position: fixed;
      top: 18px;
      left: 18px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #d7dde3;
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(24, 34, 46, 0.10);
      z-index: 2;
    }
    .title h1 {
      margin: 0 0 6px;
      font-size: 18px;
    }
    .title div {
      color: #5d6b78;
      font-size: 13px;
    }
    @media (max-width: 760px) {
      .panel {
        grid-template-columns: auto 1fr;
      }
      .metric {
        display: none;
      }
    }
  </style>
</head>

1427568767067}, {"t": 232.888, "x": -5.624498623950102, "y": -9.210646423382173, "z": -2.5, "speed": 0.09406145243257956, "distance": 28.24073965255789}, {"t": 232.988, "x": -5.615186540159277, "y": -9.210646423382173, "z": -2.5, "speed": 0.09312083790825376, "distance": 28.250051736348716}, {"t": 233.088, "x": -5.615186540159277, "y": -9.210646423382173, "z": -2.5, "speed": 0.0, "distance": 28.250051736348716}, {"t": 233.189, "x": -5.615186540159277, "y": -9.210646423382173, "z": -2.5, "speed": 0.0, "distance": 28.250051736348716}, {"t": 233.289, "x": -5.615186540159277, "y": -9.210646423382173, "z": -2.5, "speed": 0.0, "distance": 28.250051736348716}, {"t": 233.388, "x": -5.615186540159277, "y": -9.210646423382173, "z": -2.5999999999999943, "speed": 0.0, "distance": 28.250051736348716}, {"t": 233.489, "x": -5.615186540159277, "y": -9.229178911109475, "z": -2.5999999999999943, "speed": 0.1834899774980449, "distance": 28.26858422407602}, {"t": 233.586, "x": -5.615186540159277, "y": -9.229178911109475, "z": -2.5999999999999943, "speed": 0.0, "distance": 28.26858422407602}, {"t": 233.688, "x": -5.615186540159277, "y": -9.229178911109475, "z": -2.5999999999999943, "speed": 0.0, "distance": 28.26858422407602}, {"t": 233.79, "x": -5.615186540159277, "y": -9.229178911109475, "z": -2.5999999999999943, "speed": 0.0, "distance": 28.26858422407602}, {"t": 233.888, "x": -5.615186540159277, "y": -9.229178911109475, "z": -2.5999999999999943, "speed": 0.0, "distance": 28.26858422407602}]};
    const points = payload.points;
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    const playButton = document.getElementById("play");
    const slider = document.getElementById("time");
    const speedSelect = document.getElementById("speed");
    const timeValue = document.getElementById("timeValue");
    const speedValue = document.getElementById("speedValue");
    const altValue = document.getElementById("altValue");
    document.getElementById("source").textContent = payload.source;

    let playing = false;
    let currentIndex = 0;
    let lastFrame = performance.now();
    let playheadSeconds = 0;

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      draw();
    }

    const minX = Math.min(...points.map(p => p.x));
    const maxX = Math.max(...points.map(p => p.x));
    const minY = Math.min(...points.map(p => p.y));
    const maxY = Math.max(...points.map(p => p.y));
    const minZ = Math.min(...points.map(p => p.z));
    const maxZ = Math.max(...points.map(p => p.z));
    const spanX = Math.max(maxX - minX, 1);
    const spanY = Math.max(maxY - minY, 1);
    const spanZ = Math.max(maxZ - minZ, 1);
    const duration = points[points.length - 1].t;

    function project(p) {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const scale = Math.min((w - 140) / spanX, (h - 190) / spanY) * 0.86;
      const cx = w * 0.52;
      const cy = h * 0.48;
      const x = (p.x - (minX + maxX) / 2) * scale;
      const y = (p.y - (minY + maxY) / 2) * scale;
      const z = (p.z - minZ) / spanZ;
      return {
        x: cx + x - y * 0.24,
        y: cy + y * 0.58 - x * 0.08 - z * 95,
        shadowY: cy + y * 0.58 - x * 0.08
      };
    }

    function pointAtTime(t) {
      while (currentIndex < points.length - 2 && points[currentIndex + 1].t < t) currentIndex++;
      while (currentIndex > 0 && points[currentIndex].t > t) currentIndex--;
      return points[currentIndex];
    }

    function drawGrid() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      ctx.fillStyle = "#eef2f6";
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = "#d7dde3";
      ctx.lineWidth = 1;
      for (let i = -10; i <= 10; i++) {
        ctx.beginPath();
        ctx.moveTo(w * 0.08, h * 0.5 + i * 28);
        ctx.lineTo(w * 0.92, h * 0.5 + i * 28);
        ctx.stroke();
      }
      for (let i = -12; i <= 12; i++) {
        ctx.beginPath();
        ctx.moveTo(w * 0.5 + i * 34, h * 0.12);
        ctx.lineTo(w * 0.5 + i * 34, h * 0.88);
        ctx.stroke();
      }
    }

    function drawPath() {
      ctx.lineWidth = 3;
      ctx.strokeStyle = "#1f77b4";
      ctx.beginPath();
      points.forEach((p, index) => {
        const screen = project(p);
        if (index === 0) ctx.moveTo(screen.x, screen.y);
        else ctx.lineTo(screen.x, screen.y);
      });
      ctx.stroke();
    }

    function draw() {
      drawGrid();
      drawPath();
      const p = pointAtTime(playheadSeconds);
      const screen = project(p);
      ctx.strokeStyle = "rgba(23, 32, 42, 0.28)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(screen.x, screen.y);
      ctx.lineTo(screen.x, screen.shadowY);
      ctx.stroke();
      ctx.fillStyle = "rgba(23, 32, 42, 0.16)";
      ctx.beginPath();
      ctx.ellipse(screen.x, screen.shadowY, 15, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#d62728";
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(screen.x, screen.y, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      slider.value = String(Math.round((playheadSeconds / duration) * 1000));
      timeValue.textContent = `${p.t.toFixed(1)} s`;
      speedValue.textContent = `${p.speed.toFixed(2)} m/s`;
      altValue.textContent = `${p.z.toFixed(1)} m`;
    }

    function tick(now) {
      const delta = Math.min((now - lastFrame) / 1000, 0.25);
      lastFrame = now;
      if (playing) {
        const replaySpeed = Number(speedSelect.value);
        playheadSeconds = Math.min(duration, playheadSeconds + delta * replaySpeed);
        if (playheadSeconds >= duration) {
          playing = false;
          playButton.textContent = "Play";
        }
        draw();
      }
      requestAnimationFrame(tick);
    }

    playButton.addEventListener("click", () => {
      if (playheadSeconds >= duration) playheadSeconds = 0;
      playing = !playing;
      playButton.textContent = playing ? "Pause" : "Play";
      lastFrame = performance.now();
      draw();
    });
    slider.addEventListener("input", () => {
      playing = false;
      playButton.textContent = "Play";
      playheadSeconds = duration * Number(slider.value) / 1000;
      draw();
    });
    window.addEventListener("resize", resize);
    resize();
    requestAnimationFrame(tick);
  </script>
