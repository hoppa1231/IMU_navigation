<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DataFlash Sparse Rollout</title>
  <style>
    :root {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6f8;
      color: #18212f;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 18px;
      background: #ffffff;
      border-bottom: 1px solid #d8dde5;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }
    select {
      font: inherit;
      padding: 7px 9px;
      min-width: 180px;
      border: 1px solid #bac3cf;
      border-radius: 6px;
      background: #ffffff;
      color: #18212f;
    }
    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      min-height: 0;
    }
    svg {
      width: 100%;
      height: calc(100vh - 62px);
      background: #eef1f5;
    }
    aside {
      padding: 16px;
      border-left: 1px solid #d8dde5;
      background: #ffffff;
    }
    .metric {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #edf0f4;
      font-size: 14px;
    }
    .legend {
      display: grid;
      gap: 8px;
      margin-top: 16px;
      font-size: 14px;
    }
    .key {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .swatch {
      width: 22px;
      height: 4px;
      border-radius: 2px;
    }
    @media (max-width: 820px) {
      header { flex-direction: column; align-items: stretch; }
      main { grid-template-columns: 1fr; }
      svg { height: 68vh; }
      aside { border-left: 0; border-top: 1px solid #d8dde5; }
    }
  </style>
</head>

    const select = document.getElementById('foldSelect');
    const svg = document.getElementById('plot');
    for (const foldId of Object.keys(folds).sort((a, b) => Number(a) - Number(b))) {
      const option = document.createElement('option');
      option.value = foldId;
      option.textContent = `Fold ${foldId}`;
      select.appendChild(option);
    }
    function pathFor(points, xKey, yKey, scale) {
      return points.map((p, i) => `${i ? 'L' : 'M'} ${scale.x(p[xKey]).toFixed(2)} ${scale.y(p[yKey]).toFixed(2)}`).join(' ');
    }
    function stats(rows) {
      const errors = rows.map((row) => row.err_3d_m);
      return {
        steps: rows.length,
        final: errors[errors.length - 1] || 0,
        mean: errors.reduce((a, b) => a + b, 0) / Math.max(errors.length, 1),
        max: Math.max(...errors, 0),
      };
    }
    function render() {
      const rows = folds[select.value] || [];
      const xs = rows.flatMap((p) => [p.true_east_m, p.pred_east_m]);
      const ys = rows.flatMap((p) => [p.true_north_m, p.pred_north_m]);
      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      const minY = Math.min(...ys);
      const maxY = Math.max(...ys);
      const pad = 34;
      const rect = svg.getBoundingClientRect();
      const w = Math.max(rect.width, 320);
      const h = Math.max(rect.height, 320);
      const spanX = Math.max(maxX - minX, 1);
      const spanY = Math.max(maxY - minY, 1);
      const scale = {
        x: (x) => pad + (x - minX) / spanX * (w - pad * 2),
        y: (y) => h - pad - (y - minY) / spanY * (h - pad * 2),
      };
      svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
      svg.innerHTML = `
        <path d="${pathFor(rows, 'true_east_m', 'true_north_m', scale)}" fill="none" stroke="#2563eb" stroke-width="2.6"/>
        <path d="${pathFor(rows, 'pred_east_m', 'pred_north_m', scale)}" fill="none" stroke="#dc2626" stroke-width="2.6"/>
      `;
      const s = stats(rows);
      document.getElementById('steps').textContent = s.steps.toLocaleString();
      document.getElementById('final').textContent = `${s.final.toFixed(3)} m`;
      document.getElementById('mean').textContent = `${s.mean.toFixed(3)} m`;
      document.getElementById('max').textContent = `${s.max.toFixed(3)} m`;
    }
    select.addEventListener('change', render);
    window.addEventListener('resize', render);
