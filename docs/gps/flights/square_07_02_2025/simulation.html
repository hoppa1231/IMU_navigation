<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flight simulation replay</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #eef2f6;
      color: #17202a;
    }
    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    .panel {
      position: fixed;
      left: 18px;
      right: 18px;
      bottom: 18px;
      display: grid;
      grid-template-columns: auto 1fr auto auto auto auto;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #d7dde3;
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(24, 34, 46, 0.12);
      z-index: 3;
    }
    button {
      height: 34px;
      padding: 0 14px;
      border: 1px solid #b9c3cc;
      border-radius: 6px;
      background: #ffffff;
      color: #17202a;
      font-weight: 700;
      cursor: pointer;
    }
    select {
      height: 34px;
      border: 1px solid #b9c3cc;
      border-radius: 6px;
      background: #ffffff;
      color: #17202a;
      font-weight: 700;
    }
    input[type="range"] {
      width: 100%;
    }
    .metric {
      min-width: 90px;
      font-size: 13px;
      line-height: 1.2;
      color: #5d6b78;
    }
    .metric strong {
      display: block;
      color: #17202a;
      font-size: 15px;
    }
    .title {
      position: fixed;
      top: 18px;
      left: 18px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #d7dde3;
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(24, 34, 46, 0.10);
      z-index: 2;
    }
    .title h1 {
      margin: 0 0 6px;
      font-size: 18px;
    }
    .title div {
      color: #5d6b78;
      font-size: 13px;
    }
    @media (max-width: 760px) {
      .panel {
        grid-template-columns: auto 1fr;
      }
      .metric {
        display: none;
      }
    }
  </style>
</head>

      const cy = h * 0.48;

      playButton.textContent = "Play";
      playheadSeconds = duration * Number(slider.value) / 1000;
      draw();
    });
    window.addEventListener("resize", resize);
    resize();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
